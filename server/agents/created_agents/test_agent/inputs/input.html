<form id="agent-input-form">
  <div class="form-section">
    <h2>Run Configuration</h2>

    <div class="form-field">
      <label for="project_name">Project Name</label>
      <input
        type="text"
        id="project_name"
        name="project_name"
        maxlength="255"
        value="Customer Churn Analysis"
        placeholder="Enter project name"
        required
      />
      <small class="description">Name of the project to run.</small>
    </div>

    <div class="form-field">
      <label for="model">Model</label>
      <select id="model" name="model" required>
        <option value="">Select an option</option>
        <option value="gpt-4">GPT-4</option>
        <option value="gpt-4o">GPT-4o</option>
        <option value="gpt-5" selected>GPT-5</option>
      </select>
      <small class="description">Model used to execute the agent.</small>
    </div>

    <div class="form-field">
      <label for="execution_mode">Execution Mode</label>
      <select id="execution_mode" name="execution_mode" required>
        <option value="">Select an option</option>
        <option value="fast">Fast</option>
        <option value="balanced" selected>Balanced</option>
        <option value="accurate">Accurate</option>
      </select>
      <small class="description">Tradeoff between speed and quality.</small>
    </div>

    <div class="form-field">
      <label for="max_iterations">Max Iterations</label>
      <input
        type="number"
        id="max_iterations"
        name="max_iterations"
        min="0"
        step="1"
        value="5"
        required
      />
      <small class="description">Maximum number of refinement loops.</small>
    </div>

    <div class="form-field">
      <label for="include_visualizations">Include Visualizations</label>
      <input
        type="checkbox"
        id="include_visualizations"
        name="include_visualizations"
        checked
      />
      <small class="description">Include charts and visual summaries in results.</small>
    </div>

    <div class="form-field">
      <label for="dataset">Dataset</label>
      <input
        type="file"
        id="dataset"
        name="dataset"
        accept=".csv"
      />
      <small class="description">Upload a CSV dataset file.</small>
    </div>

    <input type="hidden" name="agent_id" value="test_agent" />
  </div>

  <div class="form-actions">
    <button type="submit">Run Agent</button>
  </div>
</form>

<script>
  const form = document.getElementById('agent-input-form');

  form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const payload = {
      project_name: form.project_name.value,
      model: form.model.value,
      execution_mode: form.execution_mode.value,
      max_iterations: Number(form.max_iterations.value),
      include_visualizations: form.include_visualizations.checked,
      dataset: form.dataset.files[0] ? form.dataset.files[0].name : '',
      agent_id: form.agent_id.value
    };

    await fetch('/run-agent', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });
  });
</script>
