<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Essay Writer Input</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .form-card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fff;
    }

    input:focus {
      outline: 2px solid color-mix(in srgb, var(--accent) 25%, white);
      border-color: var(--accent);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="form-card">
    <h1>Essay Writer Inputs</h1>
    <p>Fill in the required details to run the agent.</p>

    <form id="agent-input-form" data-agent-form>
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required autocomplete="name" placeholder="Enter your name">
      </div>

      <div class="field">
        <label for="age">Age</label>
        <input id="age" name="age" type="text" required inputmode="numeric" placeholder="Enter your age">
      </div>

      <div class="field">
        <label for="country">Country</label>
        <input id="country" name="country" type="text" required autocomplete="country-name" placeholder="Enter your country">
      </div>

      <div class="actions">
        <button type="submit">Run Agent</button>
      </div>
    </form>
  </main>
</body>
</html>
